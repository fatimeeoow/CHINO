<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chino Para Yuni<3</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos CSS personalizados */
        body { font-family: 'Inter', sans-serif; }
        .lang-zh { font-family: 'Noto Sans SC', sans-serif; } /* Fuente para caracteres */
        
        /* Efecto 3D para el volteo de las cartas */
        .perspective-1000 { perspective: 1000px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s; transform-style: preserve-3d;
        }
        .is-flipped { transform: rotateY(180deg); } /* Gira la carta 180 grados */
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div id="root"></div>

    <script type="text/babel">
        // Extraemos las funciones necesarias de las librerías cargadas
        const { useState, useEffect, useRef } = React;
        const { pinyin } = pinyinPro;

        // 2. COMPONENTE DE ICONOS (Dibujos vectoriales para los botones)
        const Icons = {
            Magic: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        };

        function App() {
            // 3. ESTADOS (La memoria temporal de la página)
            // 'cards' guarda la lista de palabras. Intenta leer del disco duro del navegador (localStorage) al iniciar.
            const [cards, setCards] = useState(() => {
                const saved = localStorage.getItem('chino-flashcards-v6');
                return saved ? JSON.parse(saved) : [];
            });

            const [view, setView] = useState('study'); // 'study' muestra las cartas, 'edit' el formulario
            const [currentIndex, setCurrentIndex] = useState(0); // Qué número de carta estamos viendo
            const [isFlipped, setIsFlipped] = useState(false); // Si la carta está volteada o no
            const [loading, setLoading] = useState(false); // Estado para mostrar la animación de carga
            
            // Datos que el usuario escribe en el formulario
            const [formData, setFormData] = useState({ hanzi: '', pinyin: '', translation: '' });
            
            // Referencia para el botón de subir archivos oculto
            const fileInputRef = useRef(null);

            // 4. EFECTOS (Acciones automáticas)
            // Cada vez que la lista de 'cards' cambie, guardamos una copia en el navegador
            useEffect(() => {
                localStorage.setItem('chino-flashcards-v6', JSON.stringify(cards));
            }, [cards]);

            // 5. FUNCIÓN: CONSULTAR DICCIONARIO
            const consultarDiccionario = async () => {
                if (!formData.translation) return; // Si no hay texto, no hace nada
                setLoading(true); // Activa el círculo de carga
                
                try {
                    const word = formData.translation.trim().toLowerCase();
                    // Consultamos a la base de datos (MyMemory/Glosbe Proxy)
                    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=es|zh`;
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.responseData.translatedText) {
                        const resHanzi = data.responseData.translatedText;
                        // Usamos pinyin-pro para obtener el pinyin oficial con tonos
                        const resPinyin = pinyin(resHanzi, { toneType: 'symbol' });
                        
                        // Actualizamos el formulario con lo encontrado
                        setFormData({ ...formData, hanzi: resHanzi, pinyin: resPinyin });
                    }
                } catch (err) {
                    alert("Error al conectar con el diccionario.");
                }
                setLoading(false); // Desactiva la carga
            };

            // 6. FUNCIÓN: EXPORTAR (Descargar archivo JSON)
            const exportMazo = () => {
                const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mazo-chino-pro.json';
                a.click(); // Simula un clic para descargar el archivo
            };

            // 7. FUNCIÓN: IMPORTAR (Subir archivo JSON)
            const importMazo = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        // Combinamos las cartas que ya teníamos con las nuevas
                        setCards([...cards, ...imported]);
                    } catch (err) { alert("Archivo inválido"); }
                };
                reader.readAsText(file);
            };

            return (
                <div className="max-w-4xl mx-auto">
                    {/* BARRA DE NAVEGACIÓN SUPERIOR */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <h1 className="text-2xl font-black text-indigo-600 tracking-tighter italic uppercase">Chino para Yuni</h1>
                        
                        {/* Selector de Vista: Estudiar o Editar */}
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setView('study')} className={`px-6 py-2 rounded-lg font-bold transition ${view==='study'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}`}>Estudiar</button>
                            <button onClick={() => setView('edit')} className={`px-6 py-2 rounded-lg font-bold transition ${view==='edit'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}`}>Editor</button>
                        </div>

                        {/* Botones de Archivo */}
                        <div className="flex gap-2">
                            <button onClick={exportMazo} className="p-2 bg-emerald-50 text-emerald-600 rounded-xl hover:bg-emerald-100 transition" title="Guardar Mazo"><Icons.Download /></button>
                            <button onClick={() => fileInputRef.current.click()} className="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition" title="Cargar Mazo"><Icons.Upload /></button>
                            <input type="file" ref={fileInputRef} onChange={importMazo} accept=".json" className="hidden" />
                        </div>
                    </header>

                    {/* VISTA DE ESTUDIO (Donde aparecen las flashcards) */}
                    {view === 'study' ? (
                        <div className="flex flex-col items-center py-10">
                            {cards.length > 0 ? (
                                <div className="w-full max-w-md">
                                    {/* Contenedor de la carta con animación */}
                                    <div className="h-80 perspective-1000 mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                        <div className={`card-inner cursor-pointer ${isFlipped ? 'is-flipped' : ''}`}>
                                            {/* PARTE FRONTAL: Hanzi y Pinyin */}
                                            <div className="absolute w-full h-full backface-hidden bg-white rounded-[2.5rem] shadow-xl flex flex-col items-center justify-center border-2 border-slate-100">
                                                <div className="text-8xl font-black lang-zh text-slate-800">{cards[currentIndex].hanzi}</div>
                                                <div className="text-2xl text-slate-400 mt-6 font-serif tracking-widest">{cards[currentIndex].pinyin}</div>
                                            </div>
                                            {/* PARTE TRASERA: Traducción al Español */}
                                            <div className="absolute w-full h-full backface-hidden bg-indigo-600 rounded-[2.5rem] shadow-xl flex flex-col items-center justify-center text-white [transform:rotateY(180deg)]">
                                                <div className="text-4xl font-bold text-center px-8 leading-tight uppercase tracking-tight">{cards[currentIndex].translation}</div>
                                            </div>
                                        </div>
                                    </div>
                                    {/* Controles de navegación de cartas */}
                                    <div className="flex justify-between items-center w-full px-6">
                                        <button onClick={() => {setIsFlipped(false); setCurrentIndex((currentIndex-1+cards.length)%cards.length)}} className="text-slate-400 hover:text-indigo-600 font-black tracking-tighter uppercase transition">Ant.</button>
                                        <span className="bg-indigo-50 text-indigo-600 px-6 py-2 rounded-full font-bold shadow-inner">{currentIndex+1} / {cards.length}</span>
                                        <button onClick={() => {setIsFlipped(false); setCurrentIndex((currentIndex+1)%cards.length)}} className="text-slate-400 hover:text-indigo-600 font-black tracking-tighter uppercase transition">Sig.</button>
                                    </div>
                                </div>
                            ) : <div className="text-slate-300 font-black text-xl italic uppercase border-4 border-dashed p-20 rounded-3xl">Mazo Vacío</div>}
                        </div>
                    ) : (
                        /* VISTA DEL EDITOR (Donde se crean las cartas) */
                        <div className="grid md:grid-cols-2 gap-8">
                            {/* Bloque Izquierdo: Formulario de creación */}
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-lg border border-slate-50">
                                <h2 className="text-sm font-black text-slate-400 mb-6 tracking-[0.2em] uppercase">Nueva Entrada Diccionario</h2>
                                <div className="space-y-6">
                                    {/* Input Español + Botón Diccionario */}
                                    <div>
                                        <div className="flex gap-2">
                                            <input value={formData.translation} onChange={e=>setFormData({...formData, translation:e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none font-bold text-slate-700" placeholder="Palabra en español..."/>
                                            <button onClick={consultarDiccionario} disabled={loading} className="bg-indigo-600 text-white px-6 rounded-2xl hover:bg-indigo-700 transition flex items-center justify-center">
                                                {loading ? <span className="animate-spin text-xl">◌</span> : <Icons.Search />}
                                            </button>
                                        </div>
                                    </div>
                                    {/* Resultados: Hanzi y Pinyin */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <input value={formData.hanzi} onChange={e=>setFormData({...formData, hanzi:e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl text-center text-3xl lang-zh text-slate-800" placeholder="汉字"/>
                                        <input value={formData.pinyin} onChange={e=>setFormData({...formData, pinyin:e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl text-center font-serif text-slate-500" placeholder="pīnyīn"/>
                                    </div>
                                    {/* Botón Final para Guardar en el mazo */}
                                    <button onClick={() => {if(!formData.hanzi)return; setCards([...cards, {...formData, id:Date.now()}]); setFormData({hanzi:'', pinyin:'', translation:''})}} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black tracking-widest hover:bg-indigo-600 transition shadow-lg">AGREGAR AL MAZO</button>
                                </div>
                            </div>
                            
                            {/* Bloque Derecho: Lista de palabras guardadas para borrar */}
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 max-h-[500px] overflow-y-auto">
                                <h3 className="text-[10px] font-black text-slate-400 mb-4 tracking-[0.3em] uppercase px-2">Diccionario del Usuario</h3>
                                {cards.map(c => (
                                    <div key={c.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2 group hover:bg-white border border-transparent hover:border-indigo-100 transition shadow-sm">
                                        <div>
                                            <div className="font-bold text-slate-800">{c.hanzi} <span className="text-slate-400 font-normal ml-2">[{c.translation}]</span></div>
                                            <div className="text-[10px] text-indigo-500 font-black uppercase tracking-widest">{c.pinyin}</div>
                                        </div>
                                        {/* Botón para eliminar palabra individualmente */}
                                        <button onClick={() => setCards(cards.filter(item => item.id !== c.id))} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 p-2"><Icons.Trash /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Renderizado final de la aplicación en el div con id "root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
