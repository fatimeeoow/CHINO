<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chino Pro v3 - Generador Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .lang-zh { font-family: 'Noto Sans SC', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .is-flipped { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { pinyin } = pinyinPro;

        const Icons = {
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Magic: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
        };

        const colorMap = {
            verb: { bg: 'bg-rose-100', text: 'text-rose-800', border: 'border-rose-200', label: 'Verbo' },
            noun: { bg: 'bg-blue-100', text: 'text-blue-800', border: 'border-blue-200', label: 'Sustantivo' },
            adj: { bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-200', label: 'Adjetivo' },
            other: { bg: 'bg-slate-100', text: 'text-slate-800', border: 'border-slate-200', label: 'Otros' }
        };

        function App() {
            const [cards, setCards] = useState(() => {
                const saved = localStorage.getItem('chino-flashcards-v3');
                return saved ? JSON.parse(saved) : [];
            });

            const [view, setView] = useState('study');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [loading, setLoading] = useState(false);
            
            const [formData, setFormData] = useState({ hanzi: '', pinyin: '', translation: '', category: 'noun', type: '' });

            useEffect(() => {
                localStorage.setItem('chino-flashcards-v3', JSON.stringify(cards));
            }, [cards]);

            // FUNCIÓN MÁGICA: Traducir y generar Pinyin
            const autoGenerate = async () => {
                if (!formData.translation) return alert("Escribe primero la palabra en español");
                setLoading(true);
                try {
                    // 1. Traducir usando SimplyTranslate (Instancia pública gratuita)
                    const response = await fetch(`https://api.simplytranslate.ai/translate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: formData.translation,
                            from: "es",
                            to: "zh-cn"
                        })
                    });
                    const data = await response.json();
                    const translatedText = data.result;

                    // 2. Generar Pinyin usando la librería local pinyin-pro
                    const generatedPinyin = pinyin(translatedText, { toneType: 'symbol' });

                    setFormData(prev => ({
                        ...prev,
                        hanzi: translatedText,
                        pinyin: generatedPinyin
                    }));
                } catch (error) {
                    console.error(error);
                    alert("Error al conectar con el traductor. Inténtalo de nuevo.");
                } finally {
                    setLoading(false);
                }
            };

            const addCard = (e) => {
                e.preventDefault();
                if(!formData.hanzi || !formData.translation) return;
                setCards([...cards, { ...formData, id: Date.now() }]);
                setFormData({ hanzi: '', pinyin: '', translation: '', category: 'noun', type: '' });
            };

            return (
                <div className="max-w-4xl mx-auto">
                    <header className="text-center mb-8">
                        <h1 className="text-3xl font-black text-slate-800">CHINO INTERACTIVO</h1>
                        <p className="text-slate-500">Nivel 1-4 • Herramienta de Autor</p>
                    </header>

                    <nav className="flex justify-center gap-4 mb-8">
                        <button onClick={() => setView('study')} className={`px-6 py-2 rounded-full font-bold transition flex items-center gap-2 ${view === 'study' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 shadow-sm'}`}>
                            <Icons.Book /> Estudiar
                        </button>
                        <button onClick={() => setView('edit')} className={`px-6 py-2 rounded-full font-bold transition flex items-center gap-2 ${view === 'edit' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 shadow-sm'}`}>
                            <Icons.Plus /> Crear Cartas
                        </button>
                    </nav>

                    {view === 'study' ? (
                        <div className="flex flex-col items-center">
                            {cards.length > 0 ? (
                                <div className="w-full max-w-md h-80 perspective-1000">
                                    <div className={`card-inner cursor-pointer ${isFlipped ? 'is-flipped' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                        <div className={`absolute w-full h-full backface-hidden rounded-3xl shadow-xl flex flex-col items-center justify-center border-4 bg-white border-indigo-100`}>
                                            <h2 className="text-7xl font-black lang-zh mb-4">{cards[currentIndex].hanzi}</h2>
                                            <p className="text-2xl text-slate-400 italic">{cards[currentIndex].pinyin}</p>
                                        </div>
                                        <div className={`absolute w-full h-full backface-hidden rounded-3xl shadow-xl flex flex-col items-center justify-center border-4 bg-white border-indigo-600 [transform:rotateY(180deg)]`}>
                                            <p className="text-4xl font-bold text-slate-800">{cards[currentIndex].translation}</p>
                                            <span className="mt-4 px-4 py-1 bg-indigo-50 text-indigo-600 rounded-full text-sm font-bold uppercase tracking-widest">{cards[currentIndex].category}</span>
                                        </div>
                                    </div>
                                    <div className="mt-8 flex justify-between items-center w-full px-4">
                                        <button onClick={() => {setIsFlipped(false); setCurrentIndex((currentIndex - 1 + cards.length) % cards.length)}} className="text-slate-400 hover:text-indigo-600 font-bold text-xl">Anterior</button>
                                        <span className="font-mono text-slate-400">{currentIndex + 1} / {cards.length}</span>
                                        <button onClick={() => {setIsFlipped(false); setCurrentIndex((currentIndex + 1) % cards.length)}} className="text-slate-400 hover:text-indigo-600 font-bold text-xl">Siguiente</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center p-20 border-4 border-dashed border-slate-200 rounded-3xl">
                                    <p className="text-slate-400 font-medium italic">Tu mazo está vacío. ¡Empieza a crear!</p>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="grid md:grid-cols-2 gap-8">
                            {/* Editor Inteligente */}
                            <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                                <h3 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
                                    <Icons.Magic /> Generador Mágico
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-black text-slate-400 uppercase mb-2">Paso 1: Palabra en Español</label>
                                        <div className="flex gap-2">
                                            <input value={formData.translation} onChange={e => setFormData({...formData, translation: e.target.value})} className="flex-1 p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-indigo-500 outline-none font-bold" placeholder="Ej: Libro"/>
                                            <button onClick={autoGenerate} disabled={loading} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 rounded-2xl transition-all disabled:opacity-50 flex items-center justify-center">
                                                {loading ? "..." : <Icons.Magic />}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-black text-slate-400 uppercase mb-2 text-center">Hanzi (Auto)</label>
                                            <input value={formData.hanzi} onChange={e => setFormData({...formData, hanzi: e.target.value})} className="w-full p-4 rounded-2xl bg-white border-2 border-indigo-100 text-center text-2xl lang-zh" placeholder="书"/>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-black text-slate-400 uppercase mb-2 text-center">Pinyin (Auto)</label>
                                            <input value={formData.pinyin} onChange={e => setFormData({...formData, pinyin: e.target.value})} className="w-full p-4 rounded-2xl bg-white border-2 border-indigo-100 text-center font-serif" placeholder="shū"/>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-black text-slate-400 uppercase mb-2">Categoría</label>
                                        <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none appearance-none">
                                            <option value="noun">Sustantivo</option>
                                            <option value="verb">Verbo</option>
                                            <option value="adj">Adjetivo</option>
                                            <option value="other">Otros / Gramática</option>
                                        </select>
                                    </div>
                                    <button onClick={addCard} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-lg hover:bg-indigo-600 transition-colors">
                                        GUARDAR EN EL MAZO
                                    </button>
                                </div>
                            </div>

                            {/* Listado de Cartas */}
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 overflow-y-auto max-h-[600px]">
                                <h3 className="font-black text-slate-400 uppercase text-xs mb-4 tracking-widest">Mi Diccionario Personal ({cards.length})</h3>
                                <div className="space-y-3">
                                    {cards.map(card => (
                                        <div key={card.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl group border border-transparent hover:border-indigo-100 hover:bg-white transition-all">
                                            <div className="flex items-center gap-4">
                                                <div className="text-2xl lang-zh font-bold text-indigo-600">{card.hanzi}</div>
                                                <div>
                                                    <p className="font-bold text-slate-800 leading-none">{card.translation}</p>
                                                    <p className="text-xs text-slate-400 mt-1">{card.pinyin}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => setCards(cards.filter(c => c.id !== card.id))} className="text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <Icons.Trash />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
